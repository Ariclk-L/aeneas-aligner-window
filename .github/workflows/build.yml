name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4
          pip install aeneas pyinstaller chardet
        shell: pwsh

      - name: Download FFmpeg
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          Rename-Item $dir.FullName "ffmpeg"
          Remove-Item ffmpeg.zip
          dir ffmpeg\bin
        shell: pwsh

      - name: Download eSpeak
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # 使用 espeak-ng Windows 替代方案（含 libespeak.dll）
          Invoke-WebRequest -Uri "https://github.com/espeak-ng/espeak-ng/releases/download/1.51/espeak-ng-x64.zip" -OutFile "espeak.zip"
          Expand-Archive -Path espeak.zip -DestinationPath espeak
          Remove-Item espeak.zip
          dir espeak
        shell: pwsh

      - name: Build with PyInstaller
        run: pyinstaller align.spec --clean --noconfirm
        shell: pwsh

      - name: List dist contents
        run: dir dist
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: align-windows-exe
          path: dist/align.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/align.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
